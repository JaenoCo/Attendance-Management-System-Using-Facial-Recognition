{% extends "base.html" %}

{% block title %}Attendance - School Attendance System{% endblock %}

{% block content %}
<h2><i class="bi bi-check-square"></i> Attendance Management</h2>
<hr>

<div class="row mb-4">
    <div class="col-md-4">
        <select class="form-control" id="class-filter">
            <option value="">All Classes</option>
        </select>
    </div>
    <div class="col-md-4">
        <input type="date" class="form-control" id="date-filter" value="">
    </div>
    <div class="col-md-4">
        <button class="btn btn-custom btn-block" onclick="loadAttendance()">
            <i class="bi bi-search"></i> Filter
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5>Attendance Log</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover" id="attendance-table">
                <thead class="table-light">
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Entry Time</th>
                        <th>Exit Time</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Attendance Modal -->
<div class="modal fade" id="attendanceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Attendance</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="attendanceForm">
                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text" class="form-control" id="att-student-name" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Entry Time</label>
                        <input type="time" class="form-control" id="att-entry-time">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Exit Time</label>
                        <input type="time" class="form-control" id="att-exit-time">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-control" id="att-status">
                            <option value="present">Present</option>
                            <option value="absent">Absent</option>
                            <option value="late">Late</option>
                            <option value="leave">Leave</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Remarks</label>
                        <textarea class="form-control" id="att-remarks"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-custom" onclick="saveAttendance()">Save</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    let attendanceModal;

    $(document).ready(function() {
        attendanceModal = new bootstrap.Modal(document.getElementById('attendanceModal'));
        document.getElementById('date-filter').valueAsDate = new Date();
        loadClasses();
        loadAttendance();
    });

    function loadClasses() {
        $.get('/api/classes', function(data) {
            const select = $('#class-filter');
            data.forEach(cls => {
                select.append(`<option value="${cls.class_id}">${cls.class_name}</option>`);
            });
        });
    }

    function loadAttendance() {
        $.get('/api/attendance/today', function(data) {
            const tbody = $('#attendance-table tbody');
            tbody.empty();

            data.forEach(record => {
                const statusBadge = `<span class="badge badge-${record.status}">${record.status}</span>`;
                const row = `
                    <tr>
                        <td>${record.roll_number}</td>
                        <td>${record.first_name} ${record.last_name}</td>
                        <td>${record.class_name || 'N/A'}</td>
                        <td>${record.entry_time ? record.entry_time.substr(0, 5) : '-'}</td>
                        <td>${record.exit_time ? record.exit_time.substr(0, 5) : '-'}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="editAttendance(${record.student_id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }).fail(function(error) {
            alert('Error loading attendance: ' + error.statusText);
        });
    }

    function editAttendance(studentId) {
        $.get(`/api/students/${studentId}`, function(student) {
            $('#att-student-name').val(student.first_name + ' ' + student.last_name);
            attendanceModal.show();
        });
    }

    function saveAttendance() {
        alert('Save functionality coming soon!');
    }
</script>
{% endblock %}
